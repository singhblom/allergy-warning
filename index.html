<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>花生过敏警告卡</title>
<meta name="theme-color" content="#26211d">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* Kaiti (楷体) for the softer Chinese explanatory text */
  @font-face {
    font-family:'LXGW WenKai'; font-style:normal; font-weight:400; font-display:swap;
    src:url('./fonts/lxgw-wenkai.woff2') format('woff2');
  }
  /* Garamond — the Latin partner for kaiti (pinyin / English explanations) */
  @font-face {
    font-family:'EB Garamond'; font-style:normal; font-weight:400; font-display:swap;
    src:url('./fonts/ebgaramond-latin.woff2') format('woff2');
    unicode-range:U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2122, U+2212;
  }
  @font-face {
    font-family:'EB Garamond'; font-style:normal; font-weight:400; font-display:swap;
    src:url('./fonts/ebgaramond-latinext.woff2') format('woff2');
    unicode-range:U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+1E00-1E9F, U+2C60-2C7F, U+A720-A7FF;
  }

  html, body { margin:0; height:100%; -webkit-text-size-adjust:100%; }

  /* ---- Theme tokens ---- */
  body.dark  { --page:#26211d; --card:#26211d; --band:transparent; --kicker:#e0a89f;
               --big:#f26555; --note:#d9d3c8; --rule:rgba(255,255,255,0.14); --icon:#f26555; }
  body.light { --page:#ffffff; --card:#ffffff; --band:#c0392b; --kicker:rgba(255,255,255,0.85);
               --big:#ffffff; --note:#1c1a17; --rule:rgba(0,0,0,0.10); --icon:#c0392b; }

  body { background:var(--page); }

  .wrap { min-height:100vh; box-sizing:border-box; display:flex; align-items:stretch; justify-content:center; padding:0; font-family:'Inter',sans-serif; }
  .card { position:relative; width:100%; min-height:100vh; background:var(--card); overflow:hidden; display:flex; flex-direction:column; }

  /* Top band — big characters */
  .band { background:var(--band); padding:28px 36px 24px; text-align:center; display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; }
  .kicker { font-family:'Inter',sans-serif; font-size:13px; font-weight:600; letter-spacing:0.24em; text-transform:uppercase; color:var(--kicker); margin-bottom:16px; }
  .big { font-family:'Noto Sans SC',sans-serif; font-size:clamp(72px, 24vw, 92px); line-height:1.02; font-weight:900; color:var(--big); letter-spacing:0.06em; }
  /* Latin scripts (pinyin / English) are wider — scale down to fit narrow screens */
  .big.latin { font-size:clamp(40px, 13vw, 64px); letter-spacing:0.02em; word-break:break-word; }
  body.dark  .big { animation:pulseDark  2.8s ease-in-out infinite; }
  body.light .big { animation:pulseLight 2.8s ease-in-out infinite; }

  /* Bottom section — instruction + icon */
  .body { padding:0 36px 28px; text-align:center; font-family:'Noto Sans SC',sans-serif; }
  .rule { height:1px; background:var(--rule); margin:22px 0; }
  /* Light: hide the top divider but keep the same vertical gap the dark rule creates */
  body.light .body .rule:first-child { visibility:hidden; }
  .note { margin:0; font-size:22px; font-weight:400; line-height:1.7; color:var(--note);
          font-family:'LXGW WenKai','Noto Sans SC',serif; }
  /* Latin views (pinyin / English): pair the kaiti with Garamond */
  body.latin-text .note { font-family:'EB Garamond',Georgia,serif; font-size:23px; line-height:1.55; }
  .iconrow { display:flex; justify-content:center; }
  .icon { position:relative; width:132px; height:132px; border-radius:50%; border:9px solid var(--icon); display:flex; align-items:center; justify-content:center; }
  .slash { position:absolute; left:50%; top:50%; width:150px; height:9px; background:var(--icon); transform:translate(-50%,-50%) rotate(45deg); border-radius:9px; }

  @keyframes pulseDark  { 0%,100%{ text-shadow:0 0 0 rgba(242,101,85,0);   transform:scale(1); }
                          50%   { text-shadow:0 0 18px rgba(255,138,92,0.32); transform:scale(1.02); } }
  @keyframes pulseLight { 0%,100%{ text-shadow:0 0 0 rgba(255,255,255,0);  transform:scale(1); }
                          50%   { text-shadow:0 0 16px rgba(255,255,255,0.45); transform:scale(1.02); } }

  /* Discreet stacked controls (bottom-left) */
  .controls { position:fixed; left:16px; bottom:calc(16px + env(safe-area-inset-bottom));
              display:flex; flex-direction:column-reverse; gap:10px; z-index:5; }
  .ctrl { width:34px; height:34px; border-radius:50%;
          border:1px solid rgba(128,128,128,0.35); background:rgba(128,128,128,0.12);
          color:rgba(128,128,128,0.9); display:flex; align-items:center; justify-content:center;
          cursor:pointer; opacity:0.4; transition:opacity .2s; padding:0;
          font-family:'Inter',sans-serif; font-size:13px; font-weight:600; }
  .ctrl:hover, .ctrl:active { opacity:0.9; }
  .ctrl svg { width:17px; height:17px; }

  /* Detail pane */
  .detail { display:none; flex:1; overflow-y:auto; text-align:left;
            font-family:'Noto Sans SC',sans-serif; padding:0; }
  body.view-detail .band, body.view-detail .body { display:none; }
  body.view-detail .detail { display:block; }
  .detail-title { margin:0; background:var(--band); color:var(--big);
                  font-family:'Noto Sans SC',sans-serif;
                  font-size:clamp(26px, 7.5vw, 34px); font-weight:900; line-height:1.2;
                  padding:26px 32px; text-align:center; }
  .detail-list { padding:10px 32px calc(30px + env(safe-area-inset-bottom)); }
  .d-item { border-top:1px solid var(--rule); }
  .d-item:last-child { border-bottom:1px solid var(--rule); }
  /* Light: hide the rule directly under the red band, but keep its height */
  body.light .d-item:first-child { border-top-color:transparent; }
  .d-item > summary { list-style:none; cursor:pointer; position:relative;
                      padding:15px 30px 15px 0; font-size:18px; font-weight:700;
                      line-height:1.35; color:var(--note); }
  .d-item > summary::-webkit-details-marker { display:none; }
  .d-item > summary::after { content:"+"; position:absolute; right:2px; top:14px;
                             font-size:22px; font-weight:400; line-height:1; color:var(--icon); }
  .d-item[open] > summary::after { content:"\2212"; } /* minus */
  .d-item > p { margin:0; padding:0 30px 16px 0; font-size:16px; line-height:1.6;
                font-weight:400; color:var(--note); opacity:0.78;
                font-family:'LXGW WenKai','Noto Sans SC',serif; }
  /* Latin views (pinyin / English): pair the kaiti with Garamond */
  body.latin-text .d-item > p { font-family:'EB Garamond',Georgia,serif;
                                font-size:16.5px; line-height:1.62; }
</style>
</head>
<body class="dark">
  <div class="wrap">
    <div class="card">
      <div class="band">
        <div class="kicker">Peanut Allergy</div>
        <div class="big" id="big">花生<br>过敏</div>
      </div>
      <div class="body">
        <div class="rule"></div>
        <p class="note" id="note">我儿子对花生严重过敏，<br>误食可能危及生命。<br>请确保食物不含花生。</p>
        <div class="rule"></div>
        <div class="iconrow">
          <div class="icon">
            <span style="font-size:64px; line-height:1;">🥜</span>
            <div class="slash"></div>
          </div>
        </div>
      </div>
      <div class="detail">
        <h2 class="detail-title" id="detailTitle"></h2>
        <div class="detail-list" id="detailList"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl" id="swap" aria-label="切换样式 / Switch style">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"></circle>
        <path d="M12 3 a9 9 0 0 1 0 18 z" fill="currentColor" stroke="none"></path>
      </svg>
    </button>
    <button class="ctrl" id="lang" aria-label="切换语言 / Switch language">中</button>
    <button class="ctrl" id="view" aria-label="切换详情 / Switch view">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="6" x2="20" y2="6"></line>
        <line x1="8" y1="12" x2="20" y2="12"></line>
        <line x1="8" y1="18" x2="20" y2="18"></line>
        <circle cx="4" cy="6" r="1"></circle>
        <circle cx="4" cy="12" r="1"></circle>
        <circle cx="4" cy="18" r="1"></circle>
      </svg>
    </button>
  </div>

  <script>
    var KEY = 'peanutCardTheme';
    var saved = localStorage.getItem(KEY);
    if (saved === 'light' || saved === 'dark') {
      document.body.classList.remove('dark', 'light');
      document.body.classList.add(saved);
    }
    document.getElementById('swap').addEventListener('click', function () {
      var next = document.body.classList.contains('dark') ? 'light' : 'dark';
      document.body.classList.remove('dark', 'light');
      document.body.classList.add(next);
      localStorage.setItem(KEY, next);
      var tc = next === 'light' ? '#c0392b' : '#26211d';
      document.querySelector('meta[name=theme-color]').setAttribute('content', tc);
    });
    var LANG_KEY = 'peanutCardLang';
    var LANGS = ['hanzi', 'pinyin', 'english'];
    var CONTENT = {
      hanzi:   { label: '中',
                 big:  '花生<br>过敏',
                 note: '我儿子对花生严重过敏，<br>误食可能危及生命。<br>请确保食物不含花生。',
                 detailTitle: '严重花生过敏 — 请注意',
                 detail: [
                   ['任何形式的花生都不行', '生的、烤的、炸的、煮的或磨碎的都很危险。'],
                   ['不要使用花生油', '尤其是浓香压榨花生油，仍含有花生蛋白。'],
                   ['不要花生类酱料', '花生酱、沙爹酱和沙茶酱都含有花生。'],
                   ['不要芝麻酱', '常与花生混合或受到污染。'],
                   ['不要撒花生碎', '凉菜、面条和甜点常在最后撒上花生碎。'],
                   ['清洗锅具、厨具和用油', '接触过花生的锅或煎炸油，未清洗前请勿使用。'],
                   ['注意隐藏的花生', '酱料、辣椒油、甜点和烘焙食品中可能含有。'],
                   ['如果不确定，请询问我们', '请不要猜测。']
                 ] },
      pinyin:  { label: '拼',
                 big:  'Huāshēng<br>Guòmǐn',
                 note: 'Wǒ érzi duì huāshēng yánzhòng guòmǐn，<br>wùshí kěnéng wēijí shēngmìng。<br>Qǐng quèbǎo shíwù bù hán huāshēng。',
                 detailTitle: 'Yánzhòng huāshēng guòmǐn — qǐng zhùyì',
                 detail: [
                   ['Rènhé xíngshì de huāshēng dōu bùxíng', 'Shēng de, kǎo de, zhá de, zhǔ de huò mó suì de dōu hěn wēixiǎn.'],
                   ['Bùyào shǐyòng huāshēng yóu', 'Yóuqí shì nóngxiāng yāzhà huāshēng yóu, réng hán yǒu huāshēng dànbái.'],
                   ['Bùyào huāshēng lèi jiàngliào', 'Huāshēng jiàng, shādié jiàng hé shāchá jiàng dōu hán yǒu huāshēng.'],
                   ['Bùyào zhīma jiàng', 'Cháng yǔ huāshēng hùnhé huò shòudào wūrǎn.'],
                   ['Bùyào sǎ huāshēng suì', 'Liángcài, miàntiáo hé tiándiǎn cháng zài zuìhòu sǎ shàng huāshēng suì.'],
                   ['Qīngxǐ guōjù, chújù hé yòngyóu', 'Jiēchùguò huāshēng de guō huò jiānzhá yóu, wèi qīngxǐ qián qǐng wù shǐyòng.'],
                   ['Zhùyì yǐncáng de huāshēng', 'Jiàngliào, làjiāo yóu, tiándiǎn hé hōngbèi shípǐn zhōng kěnéng hán yǒu.'],
                   ['Rúguǒ bù quèdìng, qǐng xúnwèn wǒmen', 'Qǐng bùyào cāicè.']
                 ] },
      english: { label: 'EN',
                 big:  'Peanut<br>Allergy',
                 note: 'My son is severely allergic to peanuts.<br>Accidental ingestion may be life-threatening.<br>Please make sure the food contains no peanuts.',
                 detailTitle: 'Severe peanut allergy — please note',
                 detail: [
                   ['No peanuts in any form', 'Raw, roasted, fried, boiled, or ground — all are dangerous.'],
                   ['No peanut oil', 'Especially aromatic pressed peanut oil (浓香花生油), which still contains peanut protein.'],
                   ['No peanut sauces', 'Peanut sauce, satay, and sha cha sauce (沙茶酱) all contain peanut.'],
                   ['No sesame paste (芝麻酱)', 'It is often mixed with or contaminated by peanuts.'],
                   ['No crushed-peanut topping', 'A common last-minute garnish on cold dishes, noodles, and desserts.'],
                   ['Clean woks, utensils, and oil', 'Do not use pans or frying oil that have touched peanuts without cleaning them first.'],
                   ['Check for hidden peanuts', 'In sauces, chili oil, desserts, and baked goods.'],
                   ['If you are not sure, please ask us', 'Please do not guess.']
                 ] }
    };
    var bigEl = document.getElementById('big');
    var noteEl = document.getElementById('note');
    var langBtn = document.getElementById('lang');
    var detailTitleEl = document.getElementById('detailTitle');
    var detailListEl = document.getElementById('detailList');
    function applyLang(lang) {
      var c = CONTENT[lang] || CONTENT.hanzi;
      bigEl.innerHTML = c.big;
      bigEl.classList.toggle('latin', lang !== 'hanzi');
      document.body.classList.toggle('latin-text', lang !== 'hanzi');
      noteEl.innerHTML = c.note;
      langBtn.textContent = c.label;
      detailTitleEl.textContent = c.detailTitle;
      detailListEl.innerHTML = c.detail.map(function (item) {
        return '<details class="d-item"><summary>' + escapeHtml(item[0]) +
               '</summary><p>' + escapeHtml(item[1]) + '</p></details>';
      }).join('');
    }
    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    var savedLang = localStorage.getItem(LANG_KEY);
    if (LANGS.indexOf(savedLang) === -1) savedLang = 'hanzi';
    applyLang(savedLang);
    langBtn.addEventListener('click', function () {
      var next = LANGS[(LANGS.indexOf(savedLang) + 1) % LANGS.length];
      savedLang = next;
      applyLang(next);
      localStorage.setItem(LANG_KEY, next);
    });

    var VIEW_KEY = 'peanutCardView';
    if (localStorage.getItem(VIEW_KEY) === 'detail') document.body.classList.add('view-detail');
    document.getElementById('view').addEventListener('click', function () {
      var detail = document.body.classList.toggle('view-detail');
      localStorage.setItem(VIEW_KEY, detail ? 'detail' : 'card');
    });

    if ('serviceWorker' in navigator && location.protocol.indexOf('http') === 0) {
      window.addEventListener('load', function () { navigator.serviceWorker.register('./sw.js'); });
    }
  </script>
</body>
</html>
